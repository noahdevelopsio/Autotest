name: "Playwright UI Tests — SauceDemo & OrangeHRM"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Primary job: runs BOTH app test suites ─────────────────────────────
  test-all:
    name: Run All Tests (SauceDemo + OrangeHRM)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run all tests (both projects)
        run: npx playwright test

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 14

  # ─── Optional job: SauceDemo only (manual trigger or feature branches) ──
  test-saucedemo-only:
    name: Run SauceDemo Tests Only
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.ref, 'saucedemo')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run SauceDemo tests only
        run: npx playwright test --project=saucedemo

      - name: Upload SauceDemo report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: saucedemo-report
          path: playwright-report/
          retention-days: 7
